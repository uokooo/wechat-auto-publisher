<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>公众号排版器 · v1.0.2</title>
<meta name="version" content="1.0.1">
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">

<style>
:root {
  --bg: #f0f2f5; --surface: #fff; --border: #e0e0e0; --text: #333; --text2: #888;
  --accent: #07c160; --accent2: #1a1a2e; --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); height:100vh; display:flex; color:var(--text); }

/* ===== 左侧栏 ===== */
.sidebar {
  width:68px; background:var(--accent2); color:#fff;
  display:flex; flex-direction:column; align-items:center;
  padding:14px 0; gap:4px; flex-shrink:0; overflow-y:auto;
  box-shadow:2px 0 10px rgba(0,0,0,0.15); z-index:10;
}
.sidebar .brand { font-size:10px; color:#888; margin-bottom:8px; writing-mode:vertical-rl; letter-spacing:3px; }
.sidebar .style-btn {
  width:44px; height:44px; border-radius:10px; border:2px solid transparent;
  cursor:pointer; transition:all 0.2s; position:relative;
  display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700;
  color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.3);
  margin:2px 0;
}
.sidebar .style-btn:hover { transform:scale(1.12); }
.sidebar .style-btn.active { border-color:#fff; box-shadow:0 0 14px rgba(255,255,255,0.3); }
.sidebar .style-btn .label {
  position:absolute; left:54px; background:rgba(0,0,0,0.85); color:#fff;
  padding:4px 10px; border-radius:4px; font-size:11px; white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity 0.2s; z-index:100;
}
.sidebar .style-btn:hover .label { opacity:1; }

/* ===== 主区 ===== */
.main-area { flex:1; display:flex; overflow:hidden; }

/* ===== 编辑区 ===== */
.editor-panel {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
  background:var(--bg); padding:12px;
}
.editor-toolbar {
  display:flex; align-items:center; gap:10px;
  padding:10px 16px; background:var(--surface);
  border-radius:var(--radius) var(--radius) 0 0;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.editor-toolbar .title { font-size:13px; color:var(--text2); font-weight:500; }
.editor-toolbar .action-btn {
  padding:5px 14px; border:1px solid var(--border); border-radius:5px;
  background:var(--surface); cursor:pointer; font-size:12px; color:var(--text2);
  transition:all 0.15s;
}
.editor-toolbar .action-btn:hover { background:#f5f5f5; border-color:#ccc; }
.editor-toolbar .action-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.editor-toolbar .action-btn.primary:hover { background:#06ad56; }
.editor-toolbar .md-stats { margin-left:auto; font-size:11px; color:var(--text2); }
.editor-toolbar .version-badge { font-size:10px; color:#888; background:#f0f0f0; padding:2px 6px; border-radius:8px; margin-left:8px; cursor:default; }
.editor-textarea {
  flex:1; width:100%; padding:16px; border:none; resize:none;
  font-family:"SF Mono","Fira Code","Consolas",monospace;
  font-size:14px; line-height:1.7; color:#1a1a1a; background:var(--surface);
  outline:none; tab-size:2;
}

/* ===== 预览 + 复制区 ===== */
.preview-panel {
  width:420px; display:flex; flex-direction:column;
  background:#e8eaed; padding:12px 12px 12px 0; flex-shrink:0;
}
.preview-header {
  display:flex; align-items:center; gap:8px;
  padding:10px 16px; background:var(--surface);
  border-radius:var(--radius) var(--radius) 0 0;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.preview-header .title { font-size:13px; color:var(--text2); font-weight:500; }
.preview-header .device-btn {
  padding:3px 10px; border:1px solid var(--border); border-radius:4px;
  background:var(--surface); cursor:pointer; font-size:11px; color:var(--text2);
}
.preview-header .device-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.preview-scroll {
  flex:1; overflow:auto; background:var(--surface);
  border-radius:0 0 var(--radius) var(--radius);
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.preview-iframe { width:100%; min-height:100%; border:none; display:block; }

/* ===== 复制按钮条 ===== */
.copy-bar {
  display:flex; gap:8px; padding:10px 16px;
  background:var(--surface); border-top:1px solid var(--border);
  flex-shrink:0; border-radius:0 0 var(--radius) var(--radius);
}
.copy-btn {
  flex:1; padding:10px 0; border:none; border-radius:6px;
  cursor:pointer; font-size:14px; font-weight:600;
  transition:all 0.2s; text-align:center;
}
.copy-btn.wechat { background:var(--accent); color:#fff; }
.copy-btn.wechat:hover { background:#06ad56; transform:scale(1.01); }
.copy-btn.wechat.copied { background:#555; transform:none; }
.copy-btn.source { background:#f0f0f0; color:var(--text2); font-size:12px; }
.copy-btn.source:hover { background:#e5e5e5; }

@media(max-width:1100px) {
  .preview-panel { width:350px; }
}
@media(max-width:900px) {
  .main-area { flex-direction:column; }
  .preview-panel { width:100%; padding:8px; }
}
</style>

<!-- ===== 左侧风格栏 ===== -->
<div class="sidebar" id="sidebar"></div>

<!-- ===== 主区域 ===== -->
<div class="main-area">

  <div class="editor-panel">
    <div class="editor-toolbar">
      <span class="title">✏️ Markdown</span>
      <input type="file" accept=".md,.markdown" id="mdUpload" style="display:none">
      <button class="action-btn" onclick="document.getElementById('mdUpload').click()">📂 上传 MD</button>
      <button class="action-btn" onclick="loadSample()">📄 示例文章</button>
      <button class="action-btn" onclick="clearEditor()">🗑️ 清空</button>
      <span class="md-stats" id="mdStats">0 字符</span>
      <span class="version-badge" title="GitHub: uokooo/wechat-auto-publisher">v1.0.2</span>
    </div>
    <textarea class="editor-textarea" id="mdInput"
      placeholder="# 在这里粘贴或输入 Markdown 内容&#10;&#10;支持标准 Markdown 语法：标题、列表、代码、引用、表格、图片等&#10;也可以上传 .md 文件，或从飞书/Notion/Word 直接粘贴&#10;&#10;💡 提示：左侧选择风格，预览区看效果，底部「复制到公众号」即可粘贴到微信编辑器"></textarea>
  </div>

  <!-- 预览 + 复制区 -->
  <div class="preview-panel">
    <div class="preview-header">
      <span class="title">📱 预览</span>
      <button class="device-btn active" onclick="switchDevice('mobile')">手机</button>
      <button class="device-btn" onclick="switchDevice('desktop')">电脑</button>
      <span style="margin-left:auto;color:#999;font-size:11px;" id="styleNameDisplay">默认公众号风格</span>
    </div>
    <div class="preview-scroll" id="previewScroll">
      <iframe class="preview-iframe" id="previewFrame"></iframe>
    </div>
    <div class="copy-bar">
      <button class="copy-btn wechat" id="copyWechatBtn" onclick="copyToWeChat()">📋 复制到公众号</button>
      <button class="copy-btn source" onclick="viewSource()">查看源码</button>
    </div>
  </div>
</div>

const STYLE_KEYS = Object.keys(STYLES);
let currentStyle = 'wechat-default';

// ===== markdown-it 初始化 =====
const md = window.markdownit({
  html: true,
  breaks: false,
  linkify: true,
  typographer: false,
  highlight: function(str, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try {
        return '<pre><code class="hljs">' + hljs.highlight(str, { language: lang, ignoreIllegals: true }).value + '</code></pre>';
      } catch (e) {}
    }
    return '<pre><code class="hljs">' + md.utils.escapeHtml(str) + '</code></pre>';
  }
});

// ===== 构建侧边栏 =====
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="brand">风 格</div>';
  STYLE_KEYS.forEach((key, i) => {
    const s = STYLES[key];
    const btn = document.createElement('button');
    btn.className = 'style-btn' + (key === currentStyle ? ' active' : '');
    btn.style.background = s.bg;
    btn.innerHTML = `<span class="label">${i+1}. ${s.name}</span>${s.icon || '·'}`;
    btn.onclick = () => switchStyle(key);
    sb.appendChild(btn);
  });
}

// ===== 构建 CSS 字符串 =====
function buildStyleCss(styleKey) {
  const s = STYLES[styleKey];
  const tags = ['h1','h2','h3','h4','h5','h6','p','strong','em','a','ul','ol','li','blockquote','code','pre','hr','img','table','th','td','tr'];
  let css = `body { ${s.container || ''} }\n`;
  const bodyBg = s.container.match(/background-color:\s*([^!;]+)/);
  css += `html { background: ${bodyBg ? bodyBg[1].trim() : '#fff'} !important; }\n`;
  tags.forEach(t => { if(s[t]) css += `${t} { ${s[t]} }\n`; });
  return css;
}

// ===== 渲染预览 =====
function renderPreview() {
  const mdText = document.getElementById('mdInput').value;
  const htmlContent = md.render(mdText);
  const styleCss = buildStyleCss(currentStyle);
  const style = STYLES[currentStyle];

  const fullHtml = `<style>${styleCss}
  *{max-width:100%!important;box-sizing:border-box}
  img{height:auto!important}
</style>
<section style="max-width:740px;margin:0 auto;padding:10px 12px 20px;box-sizing:border-box;word-wrap:break-word">
${htmlContent}
</section>`;

  document.getElementById('previewFrame').srcdoc = fullHtml;
  document.getElementById('styleNameDisplay').textContent = style.name;
  document.getElementById('mdStats').textContent = mdText.length + ' 字符';

  localStorage.setItem('wechat_md_draft', mdText);
  localStorage.setItem('wechat_md_style', currentStyle);
}

// ===== 切换风格 =====
function switchStyle(key) {
  currentStyle = key;
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  const idx = STYLE_KEYS.indexOf(key);
  document.querySelectorAll('.style-btn')[idx]?.classList.add('active');
  renderPreview();
}

// ===== 设备切换 =====
function switchDevice(mode) {
  const frame = document.getElementById('previewFrame');
  frame.style.width = mode === 'mobile' ? '375px' : '100%';
  frame.style.margin = mode === 'mobile' ? '0 auto' : '0';
  frame.style.display = 'block';
  document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ===== 复制到公众号（富文本格式 - 内联样式，不用style标签）=====
function inlineStyles(html, styleKey) {
  const s = STYLES[styleKey];
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // 提取容器背景色
  const containerMatch = (s.container || '').match(/background-color:\s*([^!;]+)/);
  const bgColor = containerMatch ? containerMatch[1].trim() : '#fff';
  const fontFamily = (s.container || '').match(/font-family:\s*([^!;]+)/);
  const ff = fontFamily ? fontFamily[1].trim() : '-apple-system,sans-serif';

  const section = doc.createElement('section');
  section.setAttribute('style',
    `max-width:740px;margin:0 auto;padding:10px 12px 20px;box-sizing:border-box;` +
    `word-wrap:break-word;background-color:${bgColor};font-family:${ff}`
  );
  while (doc.body.firstChild) section.appendChild(doc.body.firstChild);
  doc.body.appendChild(section);

  const tagStyleMap = {
    'h1': s.h1, 'h2': s.h2, 'h3': s.h3, 'h4': s.h4, 'h5': s.h5, 'h6': s.h6,
    'p': s.p, 'strong': s.strong, 'em': s.em, 'a': s.a,
    'ul': s.ul, 'ol': s.ol, 'li': s.li,
    'blockquote': s.blockquote, 'code': s.code, 'pre': s.pre,
    'hr': s.hr, 'img': s.img,
    'table': s.table, 'th': s.th, 'td': s.td, 'tr': s.tr
  };

  Object.keys(tagStyleMap).forEach(tag => {
    if (!tagStyleMap[tag]) return;
    doc.querySelectorAll(tag).forEach(el => {
      const existing = el.getAttribute('style') || '';
      // 只合并不冲突的样式
      const newStyle = tagStyleMap[tag];
      if (existing) {
        // 已有的不覆盖，追加新属性
        const existProps = new Set(existing.split(';').map(p => p.split(':')[0].trim()));
        const addParts = newStyle.split(';').filter(p => {
          const prop = p.split(':')[0].trim();
          return prop && !existProps.has(prop);
        });
        el.setAttribute('style', existing + ';' + addParts.join(';').replace(/!important\s*/g, ''));
      } else {
        el.setAttribute('style', newStyle.replace(/!important\s*/g, ''));
      }
    });
  });

  // 图片限制最大宽度
  doc.querySelectorAll('img').forEach(img => {
    const st = img.getAttribute('style') || '';
    if (!st.includes('max-width')) img.setAttribute('style', st + ';max-width:100%;height:auto');
  });

  return doc.body.innerHTML;
}

async function copyToWeChat() {
  const mdText = document.getElementById('mdInput').value;
  if (!mdText.trim()) { showToast('⚠️ 请先输入内容'); return; }

  const htmlContent = md.render(mdText);
  const inlinedHtml = inlineStyles(htmlContent, currentStyle);

  const tmp = document.createElement('div');
  tmp.innerHTML = htmlContent;
  const plainText = tmp.textContent || '';

  const btn = document.getElementById('copyWechatBtn');
  const origText = btn.textContent;

  try {
    const htmlBlob = new Blob([inlinedHtml], { type: 'text/html' });
    const textBlob = new Blob([plainText], { type: 'text/plain' });
    await navigator.clipboard.write([new ClipboardItem({
      'text/html': htmlBlob,
      'text/plain': textBlob
    })]);
    btn.textContent = '✅ 已复制，去 Ctrl+V';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = origText; btn.classList.remove('copied'); }, 2500);
  } catch(err) {
    console.warn('Clipboard API 失败，使用降级:', err);
    const ta = document.createElement('textarea');
    ta.value = inlinedHtml;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ 已复制（降级）';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = origText; btn.classList.remove('copied'); }, 2500);
  }
}

// ===== 查看源码（改用弹窗，不用window.open避免被拦截）=====
function viewSource() {
  const htmlContent = md.render(document.getElementById('mdInput').value);
  const styleCss = buildStyleCss(currentStyle);
  const fullHtml = `<style>${styleCss}</style><section style="max-width:740px;margin:0 auto;padding:10px">${htmlContent}</section>`;
  const escaped = md.utils.escapeHtml(fullHtml);

  // 移除已有的弹窗
  const old = document.getElementById('sourceModal');
  if (old) old.remove();

  const modal = document.createElement('div');
  modal.id = 'sourceModal';
  modal.innerHTML = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9998" onclick="closeSource()"></div>
    <div style="position:fixed;top:5%;left:5%;width:90%;height:90%;background:#1e1e1e;z-index:9999;border-radius:10px;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.5)">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#252525;border-radius:10px 10px 0 0">
        <span style="color:#aaa;font-size:14px">📄 HTML 源码</span>
        <button onclick="closeSource()" style="background:#555;color:#fff;border:none;padding:4px 14px;border-radius:4px;cursor:pointer;font-size:13px">✕ 关闭</button>
      </div>
      <pre style="flex:1;overflow:auto;padding:20px;font:13px/1.6 'SF Mono','Consolas',monospace;color:#d4d4d4;white-space:pre-wrap;margin:0;tab-size:2">${escaped}</pre>
      <div style="padding:10px 20px;background:#252525;border-radius:0 0 10px 10px">
        <button onclick="copySourceCode()" style="background:#07c160;color:#fff;border:none;padding:8px 24px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">📋 复制源码</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function closeSource() {
  const m = document.getElementById('sourceModal');
  if (m) m.remove();
}

function copySourceCode() {
  const btn = event.target;
  const code = document.querySelector('#sourceModal pre').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '📋 复制源码'; }, 2000);
  });
}

// ===== 文件上传 =====
document.getElementById('mdUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('mdInput').value = ev.target.result;
    renderPreview();
  };
  reader.readAsText(file);
});

// ===== 自动保存 & 恢复 =====
document.addEventListener('DOMContentLoaded', function() {
  const saved = localStorage.getItem('wechat_md_draft');
  const savedStyle = localStorage.getItem('wechat_md_style');
  if (saved) { document.getElementById('mdInput').value = saved; }
  if (savedStyle && STYLES[savedStyle]) { currentStyle = savedStyle; }
  buildSidebar();
  // 重新高亮选中风格
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  const idx = STYLE_KEYS.indexOf(currentStyle);
  document.querySelectorAll('.style-btn')[idx]?.classList.add('active');
  renderPreview();
});

// ===== 实时编辑 =====
document.getElementById('mdInput').addEventListener('input', renderPreview);

// ===== Toast =====
function showToast(msg) {
  const d = document.createElement('div');
  d.textContent = msg;
  Object.assign(d.style, {
    position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',
    background:'rgba(0,0,0,0.8)',color:'#fff',padding:'10px 24px',borderRadius:'8px',
    fontSize:'14px',zIndex:9999,transition:'opacity 0.3s'
  });
  document.body.appendChild(d);
  setTimeout(() => { d.style.opacity='0'; setTimeout(()=>d.remove(),300); }, 2000);
}
