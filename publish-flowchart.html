<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公众号文章发布全流程</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0;padding:30px 10px}
h1{text-align:center;font-size:26px;color:#f0f0f0;margin-bottom:4px;letter-spacing:2px}
.sub{text-align:center;color:#64748b;font-size:12px;margin-bottom:20px}
.leg{display:flex;justify-content:center;gap:20px;margin-bottom:16px;font-size:12px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:6px}
.ln{width:36px;height:5px;border-radius:3px}
.ln.u{background:#f59e0b}
.ln.a{background:#14b8a6}
.ln.d{background:#a78bfa}
svg{display:block;margin:0 auto;max-width:100%;height:auto}
</style>
</head>
<body>

<h1>📱 公众号文章发布全流程</h1>
<p class="sub">从激活口令到发布完成 · 三选项体系</p>

<div class="leg">
  <div class="li"><div class="ln u"></div> 你操作</div>
  <div class="li"><div class="ln a"></div> AI自动操作</div>
  <div class="li"><div class="ln d"></div> 决策/分支</div>
</div>

<div style="text-align:center;margin:0 auto;max-width:780px">
<svg viewBox="0 0 780 1600" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a">

  <defs>
    <marker id="au" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/>
    </marker>
    <marker id="aa" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#14b8a6"/>
    </marker>
    <marker id="ad" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#a78bfa"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- ============================= -->
  <!-- 阶段1：激活口令到收图 -->
  <!-- ============================= -->

  <!-- 激活口令 -->
  <rect x="190" y="16" width="400" height="56" rx="28" fill="rgba(245,158,11,0.10)" stroke="#f59e0b" stroke-width="3"/>
  <text x="390" y="36" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">🗣 你说激活口令</text>
  <text x="390" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">"发公众号" / "写公众号" / "发照片到公众号"</text>

  <line x1="390" y1="72" x2="390" y2="102" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <!-- AI 回应 -->
  <rect x="190" y="104" width="400" height="50" rx="10" fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-width="3"/>
  <text x="390" y="128" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="bold">🤖 AI 回应："收到，等待接收图片"</text>
  <text x="390" y="146" text-anchor="middle" fill="#64748b" font-size="11">如果你不发图只说"无图"，AI直接写纯文字文章</text>

  <line x1="390" y1="154" x2="390" y2="184" stroke="#f59e0b" stroke-width="4" marker-end="url(#au)"/>

  <!-- 决策：有图还是无图 -->
  <ellipse cx="390" cy="220" rx="200" ry="36" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="390" y="218" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="bold">📸 有图片吗？</text>
  <text x="390" y="236" text-anchor="middle" fill="#a78bfa" font-size="12">你发图或说"无图"</text>

  <!-- 分叉 -->
  <line x1="280" y1="256" x2="195" y2="296" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>
  <line x1="500" y1="256" x2="585" y2="296" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <circle cx="225" cy="272" r="14" fill="#14b8a6"/>
  <text x="225" y="278" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">有图</text>
  <circle cx="555" cy="272" r="14" fill="#14b8a6"/>
  <text x="555" y="278" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">无图</text>

  <!-- 左：有图流程 -->
  <rect x="40" y="300" width="310" height="54" rx="10" fill="rgba(245,158,11,0.10)" stroke="#f59e0b" stroke-width="3"/>
  <text x="195" y="322" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">🖼 你发送图片（单张或批量）</text>
  <text x="195" y="342" text-anchor="middle" fill="#64748b" font-size="11">一次发完说"就这些" / "发完了"</text>

  <line x1="195" y1="354" x2="195" y2="388" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <rect x="40" y="390" width="310" height="54" rx="10" fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-width="3"/>
  <text x="195" y="412" text-anchor="middle" fill="#2dd4bf" font-size="13" font-weight="bold">🔧 AI 压缩每张图片</text>
  <text x="195" y="432" text-anchor="middle" fill="#64748b" font-size="11">长边 1600px · 质量自适应 &lt;1MB</text>

  <line x1="195" y1="444" x2="195" y2="478" stroke="#f59e0b" stroke-width="4" marker-end="url(#au)"/>

  <rect x="40" y="480" width="310" height="46" rx="10" fill="rgba(245,158,11,0.10)" stroke="#f59e0b" stroke-width="3"/>
  <text x="195" y="502" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">🗣 你说 "发完了" / "就这些"</text>
  <text x="195" y="518" text-anchor="middle" fill="#64748b" font-size="10">AI 确认后进入写作阶段</text>

  <line x1="195" y1="526" x2="195" y2="560" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <!-- 无图流程 -->
  <rect x="430" y="300" width="310" height="54" rx="10" fill="rgba(245,158,11,0.10)" stroke="#f59e0b" stroke-width="3"/>
  <text x="585" y="322" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">📝 你说 "无图"</text>
  <text x="585" y="342" text-anchor="middle" fill="#64748b" font-size="11">纯文字文章，直接进入写作阶段</text>

  <line x1="585" y1="354" x2="585" y2="502" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <!-- ============================= -->
  <!-- 阶段2：AI写作 -->
  <!-- ============================= -->

  <!-- 两者汇合 -->
  <line x1="195" y1="560" x2="390" y2="606" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>
  <line x1="585" y1="502" x2="390" y2="606" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <rect x="160" y="608" width="460" height="64" rx="12" fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-width="3"/>
  <text x="390" y="634" text-anchor="middle" fill="#2dd4bf" font-size="15" font-weight="bold">🤖 AI 识别图片内容 + 撰写文章</text>
  <text x="390" y="656" text-anchor="middle" fill="#94a3b8" font-size="12">自动配图注、写正文 · 作者署名 · 标记原创</text>

  <line x1="390" y1="672" x2="390" y2="710" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <!-- ============================= -->
  <!-- 阶段3：三选项 -->
  <!-- ============================= -->

  <ellipse cx="390" cy="752" rx="220" ry="44" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="390" y="748" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="bold">🤔 请选择操作</text>
  <text x="390" y="768" text-anchor="middle" fill="#a78bfa" font-size="14">你输入 1、2 或 3</text>

  <!-- 三叉 -->
  <line x1="230" y1="796" x2="140" y2="856" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>
  <line x1="390" y1="796" x2="390" y2="856" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>
  <line x1="550" y1="796" x2="640" y2="856" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <circle cx="180" cy="822" r="16" fill="#14b8a6"/>
  <text x="180" y="828" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">①</text>
  <circle cx="390" cy="822" r="16" fill="#14b8a6"/>
  <text x="390" y="828" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">②</text>
  <circle cx="600" cy="822" r="16" fill="#14b8a6"/>
  <text x="600" y="828" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">③</text>

  <!-- ============================= -->
  <!-- ① 发表 -->
  <!-- ============================= -->
  <rect x="12" y="860" width="256" height="54" rx="10" fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-width="3"/>
  <text x="140" y="882" text-anchor="middle" fill="#2dd4bf" font-size="13" font-weight="bold">📝 wenyan-cli 转 Markdown</text>
  <text x="140" y="902" text-anchor="middle" fill="#64748b" font-size="10">推送到公众号草稿箱</text>

  <line x1="140" y1="914" x2="140" y2="952" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <rect x="12" y="954" width="256" height="50" rx="10" fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-width="3"/>
  <text x="140" y="974" text-anchor="middle" fill="#2dd4bf" font-size="13" font-weight="bold">🔔 微信通知：已推送到草稿箱</text>
  <text x="140" y="992" text-anchor="middle" fill="#64748b" font-size="10">"请手动在手机微信app发布"</text>

  <line x1="140" y1="1004" x2="140" y2="1046" stroke="#f59e0b" stroke-width="4" marker-end="url(#au)"/>

  <rect x="22" y="1048" width="236" height="50" rx="10" fill="rgba(245,158,11,0.10)" stroke="#f59e0b" stroke-width="3"/>
  <text x="140" y="1068" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">📱 手机app点发布</text>
  <text x="140" y="1088" text-anchor="middle" fill="#64748b" font-size="10">不需要在电脑前</text>

  <line x1="140" y1="1098" x2="140" y2="1136" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <rect x="55" y="1138" width="170" height="40" rx="20" fill="rgba(20,184,166,0.06)" stroke="#14b8a6" stroke-width="3"/>
  <text x="140" y="1163" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="bold">✅ 发表完成</text>

  <!-- ============================= -->
  <!-- ② 美化 -->
  <!-- ============================= -->
  <rect x="262" y="860" width="256" height="54" rx="10" fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-width="3"/>
  <text x="390" y="882" text-anchor="middle" fill="#2dd4bf" font-size="13" font-weight="bold">✏️ MD 写入本地排版器</text>
  <text x="390" y="902" text-anchor="middle" fill="#64748b" font-size="10">19种风格 · 实时预览</text>

  <line x1="390" y1="914" x2="390" y2="952" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <rect x="262" y="954" width="256" height="50" rx="10" fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-width="3"/>
  <text x="390" y="974" text-anchor="middle" fill="#2dd4bf" font-size="13" font-weight="bold">🔔 发链接：请查看排版器内容</text>
  <text x="390" y="992" text-anchor="middle" fill="#64748b" font-size="10">AI 停手，不再操作</text>

  <line x1="390" y1="1004" x2="390" y2="1046" stroke="#f59e0b" stroke-width="4" marker-end="url(#au)"/>

  <rect x="262" y="1048" width="256" height="60" rx="10" fill="rgba(245,158,11,0.10)" stroke="#f59e0b" stroke-width="3"/>
  <text x="390" y="1068" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">💻 电脑打开排版器</text>
  <text x="390" y="1086" text-anchor="middle" fill="#94a3b8" font-size="10">选风格 → 预览 → 「复制到公众号」</text>
  <text x="390" y="1102" text-anchor="middle" fill="#64748b" font-size="10">微信编辑器 Ctrl+V → 填标题/作者 → 发布</text>

  <line x1="390" y1="1108" x2="390" y2="1146" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <rect x="305" y="1148" width="170" height="40" rx="20" fill="rgba(20,184,166,0.06)" stroke="#14b8a6" stroke-width="3"/>
  <text x="390" y="1173" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="bold">✅ 美观样式发表</text>

  <!-- ============================= -->
  <!-- ③ 存档 -->
  <!-- ============================= -->
  <rect x="512" y="860" width="256" height="54" rx="10" fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-width="3"/>
  <text x="640" y="882" text-anchor="middle" fill="#2dd4bf" font-size="13" font-weight="bold">☁️ 图片上传微信CDN</text>
  <text x="640" y="902" text-anchor="middle" fill="#64748b" font-size="10">永久链接，不裂图</text>

  <line x1="640" y1="914" x2="640" y2="952" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <rect x="512" y="954" width="256" height="50" rx="10" fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-width="3"/>
  <text x="640" y="974" text-anchor="middle" fill="#2dd4bf" font-size="13" font-weight="bold">📄 生成 HTML 归档</text>
  <text x="640" y="992" text-anchor="middle" fill="#64748b" font-size="10">文章完整存档</text>

  <line x1="640" y1="1004" x2="640" y2="1050" stroke="#14b8a6" stroke-width="4" marker-end="url(#aa)"/>

  <rect x="540" y="1052" width="200" height="40" rx="10" fill="rgba(71,85,105,0.12)" stroke="#475569" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="640" y="1070" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="bold">⏳ 暂存待发</text>
  <text x="640" y="1086" text-anchor="middle" fill="#64748b" font-size="10">不急着发，以后再说</text>

  <line x1="640" y1="1092" x2="640" y2="1128" stroke="#475569" stroke-width="3" marker-end="url(#ag)"/>

  <rect x="570" y="1130" width="140" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="640" y="1149" text-anchor="middle" fill="#64748b" font-size="11">后续可选</text>

  <!-- 后续分支 -->
  <line x1="570" y1="1160" x2="430" y2="1320" stroke="#f59e0b" stroke-width="3" marker-end="url(#au)" stroke-dasharray="6,4"/>
  <line x1="710" y1="1160" x2="710" y2="1260" stroke="#14b8a6" stroke-width="3" marker-end="url(#aa)" stroke-dasharray="6,4"/>

  <rect x="290" y="1322" width="280" height="50" rx="10" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="430" y="1344" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">🖼 调入排版器</text>
  <text x="430" y="1362" text-anchor="middle" fill="#64748b" font-size="10">选风格 → 复制 → 发表</text>

  <rect x="570" y="1262" width="280" height="50" rx="10" fill="rgba(20,184,166,0.08)" stroke="#14b8a6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="710" y="1284" text-anchor="middle" fill="#2dd4bf" font-size="12" font-weight="bold">📝 用① MD方式直接发表</text>
  <text x="710" y="1302" text-anchor="middle" fill="#64748b" font-size="10">自动推草稿箱，手机发布</text>

  <!-- ============================= -->
  <!-- 底部 -->
  <!-- ============================= -->
  <rect x="140" y="1450" width="500" height="80" rx="10" fill="rgba(15,23,42,0.4)" stroke="#334155" stroke-width="2"/>
  <text x="390" y="1478" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">📌 技术要点</text>
  <text x="390" y="1498" text-anchor="middle" fill="#64748b" font-size="10">• 复制到公众号使用内联 style（自动去除 !important），微信编辑器不丢格式</text>
  <text x="390" y="1516" text-anchor="middle" fill="#64748b" font-size="10">• 排版器单 HTML 文件，纯本地运行，无需服务器</text>

</svg>
</div>

</body>
</html>
